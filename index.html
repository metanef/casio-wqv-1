<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#d1d5db">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>WQV-1 Emulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="casio-body">
        <div class="flex justify-between items-end mb-2 px-2">
            <span class="ui-label">Wrist Camera</span>
            <span class="ui-label" style="font-size: 0.5rem">CASIO</span>
        </div>

        <div class="lcd-screen" id="capture-zone">
            <div class="lcd-overlay">
                <span id="clock">12:00</span>
                <span id="mode-indicator">LIVE</span>
            </div>

            <canvas id="outputCanvas" width="120" height="120" class="pixel-canvas"></canvas>

            <div class="lcd-overlay" style="top: auto; bottom: 10px; font-size: 0.9rem">
                <span>REC</span>
                <span id="counter">000</span>
            </div>

            <div id="msgBox" class="msg-box">PHOTO SAVED</div>
        </div>

        <div class="bezel-text">DIGITAL CAMERA WQV-1 / 120x120 PIXELS</div>

        <div class="mt-4 grid grid-cols-4 gap-2 px-2">
            <div class="flex flex-col items-center gap-1">
                <button class="control-btn" id="brightBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                </button>
                <span class="ui-label" style="font-size:0.6rem">BRIGHT</span>
            </div>

            <div class="flex flex-col items-center gap-1">
                <button class="control-btn" id="importBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" y1="3" x2="12" y2="15" />
                    </svg>
                </button>
                <span class="ui-label" style="font-size:0.6rem">IMPORT</span>
                <input type="file" id="fileInput" accept="image/*" style="display:none">
            </div>

            <div class="flex flex-col items-center gap-1">
                <button class="control-btn" id="camBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                        <circle cx="12" cy="13" r="4" />
                    </svg>
                </button>
                <span class="ui-label" style="font-size:0.6rem">CAM</span>
            </div>

            <div class="flex flex-col items-center gap-1">
                <button class="control-btn" id="invertBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2a10 10 0 0 0-10 10 10 10 0 0 0 10 10 10 10 0 0 0 10-10 10 10 0 0 0-10-10z" />
                        <path d="M12 2v20" />
                    </svg>
                </button>
                <span class="ui-label" style="font-size:0.6rem">INV</span>
            </div>
        </div>

        <div class="mt-4 flex justify-center">
            <div class="flex flex-col items-center gap-2">
                <button class="control-btn shutter-btn" id="shutterBtn">
                    <div class="w-6 h-6 rounded-full border-2 border-white"></div>
                </button>
                <span class="ui-label">SHUTTER</span>
            </div>
        </div>
    </div>

    <div id="gallery"></div>

    <!-- Modal -->
    <div id="imageModal" class="modal-overlay hidden">
        <button id="closeModalBtn" class="modal-close-btn">&times;</button>
        <img id="modalImage" class="modal-image" src="" alt="Enlarged view">
        <button id="downloadModalBtn" class="modal-download-btn">
            DOWNLOAD
        </button>
    </div>

    <video id="video" autoplay playsinline style="display:none"></video>

    <script src="script.js"></script>
</body>

</html>
